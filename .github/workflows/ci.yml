name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  changes:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.classify.outputs.python }}
      web: ${{ steps.classify.outputs.web }}
      full: ${{ steps.classify.outputs.full }}
      docs_only: ${{ steps.classify.outputs.docs_only }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: classify
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            {
              echo "python=true"
              echo "web=true"
              echo "full=true"
              echo "docs_only=false"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            changed_files="$(git ls-tree -r --name-only "$head")"
          else
            changed_files="$(git diff --name-only "$base" "$head")"
          fi

          python=false
          web=false
          full=false
          docs_only=true

          while IFS= read -r path; do
            [ -z "$path" ] && continue
            case "$path" in
              *.md|README.md|docs/*|docs/**|site/*|site/**)
                ;;
              apps/web/*|apps/web/**|package.json|package-lock.json|npm-shrinkwrap.json|vite.config.*|tsconfig*.json|eslint.config.*)
                web=true
                docs_only=false
                ;;
              apps/api/*|apps/api/**|libs/*|libs/**|packages/*|packages/**|services/*|services/**|scripts/*|scripts/**|tests/*|tests/**|pyproject.toml|pytest.ini)
                python=true
                docs_only=false
                ;;
              .github/workflows/*|.github/workflows/**)
                full=true
                docs_only=false
                ;;
              *)
                full=true
                docs_only=false
                ;;
            esac
          done <<< "$changed_files"

          {
            echo "python=$python"
            echo "web=$web"
            echo "full=$full"
            echo "docs_only=$docs_only"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Changed file classification"
            echo ""
            echo "- python: \`$python\`"
            echo "- web: \`$web\`"
            echo "- full: \`$full\`"
            echo "- docs_only: \`$docs_only\`"
            echo ""
            echo "<details><summary>Changed files</summary>"
            echo ""
            echo '```text'
            echo "$changed_files"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

  docs-only:
    name: Docs-only change
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs_only == 'true'

    steps:
      - name: Skip heavy checks
        run: echo "Only documentation files changed; skipping Python and Web checks."

  python-checks:
    name: Python checks
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.full == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install --no-deps \
            -e libs/axdata_core \
            -e packages/axdata-sdk \
            -e packages/axdata-source-tdx \
            -e packages/axdata-source-tdx-ext \
            -e packages/axdata-source-tencent \
            -e packages/axdata-source-cninfo

      - name: Run pytest
        run: python -m pytest -q

      - name: Compile Python modules
        run: python -m compileall -q libs/axdata_core apps/api packages/axdata-sdk services scripts tests

  web-checks:
    name: Web checks
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.full == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build Web
        run: npm run build:web

      - name: Lint Web
        run: npm run lint:web

  ci-result:
    name: CI result
    runs-on: ubuntu-latest
    needs:
      - changes
      - docs-only
      - python-checks
      - web-checks
    if: always()

    steps:
      - name: Check job results
        shell: bash
        run: |
          echo "changes: ${{ needs.changes.result }}"
          echo "docs-only: ${{ needs.docs-only.result }}"
          echo "python-checks: ${{ needs.python-checks.result }}"
          echo "web-checks: ${{ needs.web-checks.result }}"

          for result in \
            "${{ needs.changes.result }}" \
            "${{ needs.docs-only.result }}" \
            "${{ needs.python-checks.result }}" \
            "${{ needs.web-checks.result }}"
          do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              exit 1
            fi
          done
